name: Render keep-alive

on:
  schedule:
    # Every 12 minutes
    - cron: "*/12 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render backend
        run: |
          curl -fsS --max-time 30 \
            "https://sumitnayak210106-planning.hf.space/api/health" \
            || curl -fsS --max-time 30 \
            "https://sumitnayak210106-planning.hf.space/api/health/ready"
